<svg xmlns="http://www.w3.org/2000/svg" width="240" height="44" viewBox="0 0 240 44" role="img" aria-label="TSI Audit Scanner: PASSED">
  <title>TSI Audit Scanner — PASSED</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111a35"/>
    </linearGradient>
    <linearGradient id="pass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- pill body -->
  <rect x="0.5" y="0.5" width="239" height="43" rx="9" ry="9" fill="url(#bg)" stroke="#22d3ee" stroke-opacity="0.35"/>

  <!-- left: shield + check -->
  <g transform="translate(12,8)" filter="url(#glow)">
    <path d="M14 0 L27 5 V13 C27 21 21 26 14 28 C7 26 1 21 1 13 V5 Z"
          fill="none" stroke="url(#pass)" stroke-width="2" stroke-linejoin="round"/>
    <path d="M8 14 L12 18 L20 9" fill="none" stroke="url(#pass)"
          stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- divider -->
  <line x1="48" y1="10" x2="48" y2="34" stroke="#22d3ee" stroke-opacity="0.25"/>

  <!-- text -->
  <g font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-weight="700">
    <text x="58" y="19" font-size="9" fill="#9bb0c9" letter-spacing="1.2">TSI AUDIT SCANNER</text>
    <text x="58" y="34" font-size="13" fill="url(#pass)" letter-spacing="2.4">PASSED</text>
  </g>

  <!-- right status dot -->
  <circle cx="224" cy="22" r="5" fill="url(#pass)">
    <animate attributeName="opacity" values="1;0.55;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
